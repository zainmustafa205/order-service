server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=orderservice_db;encrypt=true;trustServerCertificate=true
    username: ${DB_USERNAME_ORDER_SERVICE}
    password: ${DB_PASSWORD_ORDER_SERVICE}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000